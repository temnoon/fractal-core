name = "prime-terrain-api"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain route
routes = [
  { pattern = "api.fractal-core.com/*", zone_name = "fractal-core.com" }
]

# KV namespace for persistent key storage (signing keys, rate limits)
[[kv_namespaces]]
binding = "KEYS_KV"
id = "6b7952e0fd9b4f93ad8335c28d590360"

# KV namespace for user data, API keys, and usage records
[[kv_namespaces]]
binding = "USERS_KV"
id = "e5932603e8af47d6bbc55b8a772f3657"

# KV namespace for LPP data (nodes, repeaters, epochs)
# Create with: wrangler kv:namespace create LPP_KV
[[kv_namespaces]]
binding = "LPP_KV"
id = "0aa6ebc3c6b54afb90cd150cb467a7ec"

# KV namespace for async job queue persistence
[[kv_namespaces]]
binding = "JOBS_KV"
id = "523db24c9abe4c99a6a061e2a87b57c6"

# NOTE: [limits] cpu_ms = 300000 causes worker to hang in production
# despite account being on Standard usage model. Investigate via dashboard.
# For now, chunking handles the 30s default limit.

[vars]
ENVIRONMENT = "production"
# ADMIN_API_KEY should be set via wrangler secret put ADMIN_API_KEY
