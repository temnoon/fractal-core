name = "prime-terrain-api"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain route
routes = [
  { pattern = "api.fractal-core.com/*", zone_name = "fractal-core.com" }
]

# KV namespace for persistent key storage (signing keys, rate limits)
[[kv_namespaces]]
binding = "KEYS_KV"
id = "6b7952e0fd9b4f93ad8335c28d590360"

# KV namespace for user data, API keys, and usage records
[[kv_namespaces]]
binding = "USERS_KV"
id = "e5932603e8af47d6bbc55b8a772f3657"

# KV namespace for LPP data (nodes, repeaters, epochs)
# Create with: wrangler kv:namespace create LPP_KV
[[kv_namespaces]]
binding = "LPP_KV"
id = "0aa6ebc3c6b54afb90cd150cb467a7ec"

# KV namespace for async job queue persistence
[[kv_namespaces]]
binding = "JOBS_KV"
id = "523db24c9abe4c99a6a061e2a87b57c6"

# Durable Object: FIFO cosmic-pulse minter (singleton — every request hits the
# same object via idFromName('singleton') so ordering is strictly serialized).
[[durable_objects.bindings]]
name = "COSMIC_PULSE_DO"
class_name = "CosmicPulseDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CosmicPulseDO"]

# Workers Standard CPU limit per invocation. Default 30s; Standard model
# allows up to 300000 (5 minutes). Earlier attempt at 300000 caused hangs;
# step it up empirically — 60000 (1 minute) here as a safe first bump,
# tune via /api/v1/bench/isprime before raising further.
[limits]
cpu_ms = 60000

[vars]
ENVIRONMENT = "production"
# CHUNK_TIMEOUT_MS lets us tune chunk processing duration without redeploy.
# Keep it under the [limits] cpu_ms above with margin for KV write overhead.
CHUNK_TIMEOUT_MS = "55000"
# ADMIN_API_KEY should be set via wrangler secret put ADMIN_API_KEY
